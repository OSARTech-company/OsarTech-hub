services:
  - type: web
    name: osartech-hub-lab
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    autoDeploy: true
    envVars:
      - key: INVITE_CODE
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: osartech-hub-db
          property: connectionString

databases:
  - name: osartech-hub-db
    plan: free
